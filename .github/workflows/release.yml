name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build JS dist tarball
        run: node scripts/package.mjs
      # Create the release (if it doesn't exist) with the JS dist tarball only. The workerd
      # runtime binary AND the authoritative combined checksums.txt are uploaded separately from
      # a machine that builds the fork (see scripts/upload-binary.sh) — CI can't build the fork
      # yet (roadmap), so CI must NOT clobber checksums.txt.
      - name: Create/att­ach JS dist to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "iso ${GITHUB_REF_NAME}" \
            --notes "iso ${GITHUB_REF_NAME}. Install: \`curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | bash\`

            The macOS/arm64 workerd runtime binary (\`workerd-vfs-darwin-arm64.bin\`) and combined
            \`checksums.txt\` are uploaded separately (CI can't build the fork yet — roadmap)." \
            "dist-release/iso-${GITHUB_REF_NAME}.tar.gz" \
          || gh release upload "${GITHUB_REF_NAME}" "dist-release/iso-${GITHUB_REF_NAME}.tar.gz" --clobber
