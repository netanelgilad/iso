name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build JS dist tarball
        run: node scripts/package.mjs
      - name: Create GitHub release with the JS dist + checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "iso ${GITHUB_REF_NAME}" \
            --notes "iso ${GITHUB_REF_NAME}. Install: \`curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | bash\`

            NOTE: the macOS/arm64 workerd runtime binary (\`workerd-vfs-darwin-arm64.bin\`) is uploaded
            separately from a machine that builds the fork (CI-built fork binaries are a roadmap item)." \
            dist-release/iso-*.tar.gz dist-release/checksums.txt || \
          gh release upload "${GITHUB_REF_NAME}" dist-release/iso-*.tar.gz dist-release/checksums.txt --clobber
